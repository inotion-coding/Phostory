<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Phostory</title>
    <script type="text/javascript">
        // GitHub Pages SPA Routing Hack
        // This script takes the current URL and converts it into a query parameter
        // so that index.html can parse it and restore the clean path.
        var l = window.location;
        l.replace(
            l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
            l.pathname.split('/').slice(0, 1).join('/') + '/?/' +
            l.pathname.slice(1).split('/').slice(0).join('/').replace(/&/g, '~and~') +
            (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash
        );
    </script>
</head>
<body>
    Redirecting to Phostory...
</body>
</html>
